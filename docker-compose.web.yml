services:
  flutter-web:
    build:
      context: ./recipe_list
      dockerfile: Dockerfile
    container_name: recipe_list_web
    ports:
      # Host nginx (sites-enabled/recipies.mahallem.ist) proxies to 8088.
      - "127.0.0.1:8088:80"
    restart: unless-stopped

  # Bot-only pre-render service (todo/20 chunk E). The host nginx
  # UA-split forwards Googlebot/Bingbot/etc. on `/<locale>/recipes/<id>`
  # here; humans keep getting the SPA from `flutter-web`. Cache lives in
  # a named volume so it survives container rebuilds (the cache key
  # already includes recipe.updatedAt — see prerender/lib/render-utils.js).
  prerender:
    build:
      context: ./prerender
      dockerfile: Dockerfile
    container_name: recipe_list_prerender
    depends_on:
      - flutter-web
    environment:
      - PORT=8089
      # Public origin so the SPA's CORS-enabled XHR to
      # https://mahallem.ist/recipes/lookup/<id> matches the
      # allow-list configured for production (recipies.mahallem.ist).
      # Going through our own nginx is fine — the headless browser
      # ships UA `RecipeListPrerender/1.0` which doesn't match the
      # bot regex, so the request lands on the SPA upstream (8088),
      # not back into the prerender (no recursion).
      - SPA_ORIGIN=https://recipies.mahallem.ist
      # The recipes API lives in the mahallem-user-portal stack on the
      # `local_docker_admin_backend_mahallem_network` bridge. We attach
      # to that bridge below so the in-container hostname
      # `mahallem-user-portal:4000` resolves; the bare-IP fallback
      # documented in memory/repo prod-access.md works too.
      - RECIPES_API_BASE=http://mahallem-user-portal:4000
      - CACHE_DIR=/var/cache/prerender
    volumes:
      - prerender_cache:/var/cache/prerender
    networks:
      - default
      - mahallem
    ports:
      # Host nginx UA-split routes to 8089.
      - "127.0.0.1:8089:8089"
    restart: unless-stopped

volumes:
  prerender_cache:
    name: recipe_list_prerender_cache

networks:
  default:
  mahallem:
    name: local_docker_admin_backend_mahallem_network
    external: true
