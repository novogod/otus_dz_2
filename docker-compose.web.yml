services:
  flutter-web:
    build:
      context: ./recipe_list
      dockerfile: Dockerfile
    container_name: recipe_list_web
    ports:
      # Host nginx (sites-enabled/recipies.mahallem.ist) proxies to 8088.
      - "127.0.0.1:8088:80"
    restart: unless-stopped

  # Bot-only pre-render service (todo/20 chunk E). The host nginx
  # UA-split forwards Googlebot/Bingbot/etc. on `/<locale>/recipes/<id>`
  # here; humans keep getting the SPA from `flutter-web`. Cache lives in
  # a named volume so it survives container rebuilds (the cache key
  # already includes recipe.updatedAt — see prerender/lib/render-utils.js).
  prerender:
    build:
      context: ./prerender
      dockerfile: Dockerfile
    container_name: recipe_list_prerender
    depends_on:
      - flutter-web
    environment:
      - PORT=8089
      # Internal origin — the Flutter SPA's cross-origin XHR may fail
      # CORS from this origin, but that doesn't matter: chunk F head
      # atoms are injected server-side from a parallel
      # /recipes/lookup/<id> fetch (see prerender/server.js +
      # render-utils.injectRecipeSeo). Headless Chromium is now only
      # responsible for emitting the SPA body shell, not the head.
      - SPA_ORIGIN=http://recipe_list_web
      # The recipes API lives in the mahallem-user-portal stack on the
      # `local_docker_admin_backend_mahallem_network` bridge. We attach
      # to that bridge below so the in-container hostname
      # `mahallem-user-portal:4000` resolves; the bare-IP fallback
      # documented in memory/repo prod-access.md works too.
      - RECIPES_API_BASE=http://mahallem-user-portal:4000
      - CACHE_DIR=/var/cache/prerender
    volumes:
      - prerender_cache:/var/cache/prerender
    networks:
      - default
      - mahallem
    # Prerender hits https://recipies.mahallem.ist for the SPA so the
    # SPA's XHR Origin matches the prod CORS allow-list. Docker's
    # embedded DNS (127.0.0.11) can be flaky for the multi-network
    # container layout we use here — pin the loopback to the Docker
    # bridge gateway so traffic always lands on host nginx, which
    # then UA-splits to flutter-web (the prerender's UA does NOT
    # match the bot regex, so no recursion).
    extra_hosts:
      - "recipies.mahallem.ist:host-gateway"
    ports:
      # Host nginx UA-split routes to 8089.
      - "127.0.0.1:8089:8089"
    restart: unless-stopped

volumes:
  prerender_cache:
    name: recipe_list_prerender_cache

networks:
  default:
  mahallem:
    name: local_docker_admin_backend_mahallem_network
    external: true
