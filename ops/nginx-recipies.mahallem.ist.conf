# Host nginx vhost for recipies.mahallem.ist with bot UA-split (todo/20 chunk E).
#
# Install on prod with:
#   install -o root -g root -m 0644 \
#     /var/www/recipie/otus_dz_2/ops/nginx-recipies.mahallem.ist.conf \
#     /etc/nginx/sites-available/recipies.mahallem.ist
#   nginx -t && systemctl reload nginx
#
# UA-split rationale: Googlebot / Bingbot / social-card scrapers can't
# execute the Flutter SPA's main.dart.js in a reasonable time budget, so
# they index the SPA shell (no per-recipe content). We forward those
# user-agents to the headless-Chromium pre-render service on
# 127.0.0.1:8089 (recipe_list_prerender) which serves a scrubbed static
# snapshot. Humans (and any UA we don't recognise) keep getting the SPA
# from 127.0.0.1:8088 — no behaviour change.
#
# Google explicitly permits this pattern: see
# https://developers.google.com/search/docs/crawling-indexing/javascript/dynamic-rendering

# UA → bot-flag mapping. Defined at server-context (outside any server{}),
# reload-safe. Match list mirrors docs/seo-recipe-sitemap-and-prerender.md §4.4.
map $http_user_agent $is_bot {
    default                         0;
    ~*googlebot                     1;
    ~*bingbot                       1;
    ~*yandex                        1;
    ~*duckduckbot                   1;
    ~*baiduspider                   1;
    ~*facebookexternalhit           1;
    ~*facebookcatalog               1;
    ~*facebot                       1;
    ~*twitterbot                    1;
    ~*linkedinbot                   1;
    ~*whatsapp                      1;
    ~*telegrambot                   1;
    ~*slackbot                      1;
    ~*discordbot                    1;
    ~*pinterestbot                  1;
    ~*redditbot                     1;
    ~*applebot                      1;
}

# Resolve `$upstream` once based on the bot flag, so the recipe-route
# location block stays free of `if`-blocks (those are evil per the nginx
# wiki). The SPA upstream stays the default — pre-render is opt-in.
map $is_bot $recipe_upstream {
    default                         http://127.0.0.1:8088;
    1                               http://127.0.0.1:8089;
}

server {
    server_name recipies.mahallem.ist;

    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript image/svg+xml;

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|css|js)$ {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Bot UA-split for canonical recipe URLs `/<locale>/recipes/<id>`.
    # The 10-locale list is duplicated from
    # recipe_list/lib/router/routes.dart (`localePathPattern`). Keep in
    # sync if a locale is ever added.
    location ~ ^/(en|ru|de|es|fr|it|tr|ar|fa|ku)/recipes/[0-9]+/?$ {
        proxy_pass $recipe_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pre-renderer can take ~25 s to launch Chromium on a cold cache.
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/recipies.mahallem.ist/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/recipies.mahallem.ist/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = recipies.mahallem.ist) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name recipies.mahallem.ist;
    return 404;
}
