<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- ─── SEO: core meta ──────────────────────────────────────────
       Distinct property from mahallem.ist (the parent portal). This
       host (recipies.mahallem.ist) is its own SEO surface; Google
       Search Console / Bing Webmaster / Yandex Webmaster all need
       to be registered against THIS hostname separately. See
       docs/seo.md.
  -->
  <title>Otus Food — recipes from around the world</title>
  <meta name="description" content="Otus Food — free recipes from around the world. Browse, search, save and cook with step-by-step instructions, ingredient lists and a built-in shopping list. Available as a PWA.">
  <meta name="keywords" content="recipes, cooking, food, world cuisine, step by step recipes, free recipes, meal ideas, otus food, recipies mahallem, mahallem food">
  <meta name="author" content="Otus Food">
  <meta name="application-name" content="Otus Food">
  <meta name="theme-color" content="#2ECC71">
  <meta name="color-scheme" content="light">

  <!-- robots: allow indexing + large image previews in Google
       results. max-snippet:-1 / max-video-preview:-1 are the
       Google-recommended defaults that don't restrict the SERP. -->
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
  <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1">

  <!-- Canonical: keep this in sync with og:url so social scrapers
       and search engines agree on the primary URL. -->
  <link rel="canonical" href="https://recipies.mahallem.ist/">

  <!-- Open Graph (Facebook, WhatsApp, VK, Telegram, LinkedIn, …) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Otus Food">
  <meta property="og:title" content="Otus Food — recipes from around the world">
  <meta property="og:description" content="Browse, search and cook recipes from around the world. Step-by-step instructions, ingredients, comments — works as a PWA.">
  <meta property="og:url" content="https://recipies.mahallem.ist/">
  <meta property="og:image" content="https://recipies.mahallem.ist/og-image.jpg">
  <meta property="og:image:secure_url" content="https://recipies.mahallem.ist/og-image.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="1024">
  <meta property="og:image:alt" content="Jerk chicken with rice and peas — Otus Food">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="ru_RU">
  <meta property="og:locale:alternate" content="de_DE">
  <meta property="og:locale:alternate" content="es_ES">
  <meta property="og:locale:alternate" content="fr_FR">
  <meta property="og:locale:alternate" content="it_IT">
  <meta property="og:locale:alternate" content="tr_TR">
  <meta property="og:locale:alternate" content="ar_AR">
  <meta property="og:locale:alternate" content="fa_IR">

  <!-- Twitter / X card (also picked up by some chat apps).
       summary_large_image renders the 1024×1024 og-image as a
       hero card on X / Mastodon / Slack-link unfurl. -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Otus Food — recipes from around the world">
  <meta name="twitter:description" content="Browse, search and cook recipes from around the world. Step-by-step instructions, ingredients, comments.">
  <meta name="twitter:image" content="https://recipies.mahallem.ist/og-image.jpg">
  <meta name="twitter:image:alt" content="Jerk chicken with rice and peas — Otus Food">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Otus Food">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Sitemap discovery hint (also referenced from robots.txt). -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">

  <!-- ─── SEO: structured data (JSON-LD) ──────────────────────────
       Google uses these to render rich results (sitelinks search
       box, organization knowledge panel). Distinct @id from
       mahallem.ist so Google treats this as its own entity.
  -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://recipies.mahallem.ist/#website",
        "url": "https://recipies.mahallem.ist/",
        "name": "Otus Food",
        "description": "Free recipes from around the world — browse, search, save and cook with step-by-step instructions.",
        "inLanguage": ["en", "ru", "de", "es", "fr", "it", "tr", "ar", "fa", "ku"],
        "publisher": { "@id": "https://recipies.mahallem.ist/#organization" }
      },
      {
        "@type": "Organization",
        "@id": "https://recipies.mahallem.ist/#organization",
        "name": "Otus Food",
        "url": "https://recipies.mahallem.ist/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://recipies.mahallem.ist/icons/Icon-512.png",
          "width": 512,
          "height": 512
        }
      }
    ]
  }
  </script>

  <link rel="manifest" href="manifest.json">
  <script>
    // Capture the PWA install prompt so Flutter can fire it later
    // from the Install-PWA button (see WebActionButtons).
    window.deferredPwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.deferredPwaPrompt = e;
    });
    window.addEventListener('appinstalled', function () {
      window.deferredPwaPrompt = null;
    });
    window.isPwaInstallAvailable = function () {
      return !!window.deferredPwaPrompt;
    };
    window.triggerPwaInstall = async function () {
      if (!window.deferredPwaPrompt) return 'unavailable';
      var ev = window.deferredPwaPrompt;
      window.deferredPwaPrompt = null;
      ev.prompt();
      try {
        var r = await ev.userChoice;
        return r && r.outcome ? r.outcome : 'unknown';
      } catch (_) {
        return 'error';
      }
    };
    // iOS Safari/Chrome do NOT fire `beforeinstallprompt`, but PWA
    // install IS supported via the system Share → "Add to Home
    // Screen" flow. Detect iOS so Flutter can surface a button that
    // shows manual instructions instead of calling the unavailable
    // prompt API.
    window.isIosBrowser = function () {
      try {
        var ua = navigator.userAgent || '';
        var iOS = /iPad|iPhone|iPod/.test(ua) ||
          // iPadOS 13+ identifies as Mac with touch.
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        return !!iOS;
      } catch (_) { return false; }
    };
    // True when the page is already running as an installed PWA —
    // hide the install button in that case.
    window.isPwaStandalone = function () {
      try {
        if (window.navigator && window.navigator.standalone === true) {
          return true;
        }
        if (window.matchMedia &&
            window.matchMedia('(display-mode: standalone)').matches) {
          return true;
        }
      } catch (_) {}
      return false;
    };
    // True when the browser exposes the Web Share API. Used to
    // decide between the native share sheet (share_plus) and a
    // dropdown of social-network URL intents (Linux Chrome,
    // Firefox desktop, older Edge, etc.).
    window.canWebShare = function () {
      try {
        return typeof navigator !== 'undefined' &&
          typeof navigator.share === 'function';
      } catch (_) { return false; }
    };

    // ─── Per-recipe SEO injection (todo/20 chunk F) ─────────────
    // Called from Dart (RecipeDetailsPage) once the recipe payload
    // is on screen. Mutates document.head with title, description,
    // canonical, hreflang × 10 + x-default, OG tags, Twitter card,
    // and a JSON-LD Recipe blob. Then sets <meta name="ssr-ready">
    // so the bot pre-renderer (todo/20 chunk E) knows it's safe to
    // capture document.documentElement.outerHTML.
    //
    // Idempotent: removes anything tagged data-recipe-seo="1" before
    // re-emitting, so locale switches replace head atoms instead of
    // appending them.
    (function () {
      var SUPPORTED = ['ar','de','en','es','fa','fr','it','ku','ru','tr'];
      var ORIGIN = 'https://recipies.mahallem.ist';
      function clearTagged() {
        var nodes = document.head.querySelectorAll('[data-recipe-seo="1"]');
        for (var i = 0; i < nodes.length; i++) nodes[i].remove();
        var ssr = document.head.querySelector('meta[name="ssr-ready"]');
        if (ssr) ssr.remove();
      }
      function el(tag, attrs, text) {
        var n = document.createElement(tag);
        n.setAttribute('data-recipe-seo', '1');
        for (var k in attrs) {
          if (Object.prototype.hasOwnProperty.call(attrs, k) && attrs[k] != null) {
            n.setAttribute(k, attrs[k]);
          }
        }
        if (text != null) n.textContent = text;
        return n;
      }
      window.clearRecipeSeo = function () {
        try { clearTagged(); } catch (_) {}
      };
      window.setRecipeSeo = function (data) {
        try {
          if (!data || typeof data !== 'object') return;
          var locale = data.locale && SUPPORTED.indexOf(data.locale) >= 0
            ? data.locale : 'en';
          var id = Number(data.id);
          if (!Number.isFinite(id) || id <= 0) return;
          var title = (data.title || 'Otus Food').toString();
          var description = (data.description || '').toString().slice(0, 320);
          var image = (data.image || ORIGIN + '/og-image.jpg').toString();
          var canonical = ORIGIN + '/' + locale + '/recipes/' + id;
          clearTagged();
          // <title> can't carry the data attribute marker (it's a
          // singleton element). We update its text and tag the element
          // by setting the marker on it after, so the next clear sweep
          // finds it.
          if (document.title !== title + ' — Otus Food') {
            document.title = title + ' — Otus Food';
          }
          var head = document.head;
          if (description) {
            head.appendChild(el('meta', { name: 'description', content: description }));
          }
          head.appendChild(el('link', { rel: 'canonical', href: canonical }));
          for (var i = 0; i < SUPPORTED.length; i++) {
            var lng = SUPPORTED[i];
            head.appendChild(el('link', {
              rel: 'alternate',
              hreflang: lng,
              href: ORIGIN + '/' + lng + '/recipes/' + id,
            }));
          }
          head.appendChild(el('link', {
            rel: 'alternate',
            hreflang: 'x-default',
            href: ORIGIN + '/en/recipes/' + id,
          }));
          // Open Graph
          head.appendChild(el('meta', { property: 'og:type', content: 'article' }));
          head.appendChild(el('meta', { property: 'og:title', content: title }));
          if (description) {
            head.appendChild(el('meta', { property: 'og:description', content: description }));
          }
          head.appendChild(el('meta', { property: 'og:url', content: canonical }));
          head.appendChild(el('meta', { property: 'og:image', content: image }));
          head.appendChild(el('meta', { property: 'og:locale', content: locale }));
          // Twitter
          head.appendChild(el('meta', { name: 'twitter:card', content: 'summary_large_image' }));
          head.appendChild(el('meta', { name: 'twitter:title', content: title }));
          if (description) {
            head.appendChild(el('meta', { name: 'twitter:description', content: description }));
          }
          head.appendChild(el('meta', { name: 'twitter:image', content: image }));
          // JSON-LD Recipe
          var jsonld = {
            '@context': 'https://schema.org',
            '@type': 'Recipe',
            name: title,
            inLanguage: locale,
            url: canonical,
            image: [image],
            author: { '@type': 'Organization', name: 'Otus Food' },
          };
          if (description) jsonld.description = description;
          if (Array.isArray(data.ingredients) && data.ingredients.length > 0) {
            jsonld.recipeIngredient = data.ingredients
              .map(function (s) { return (s || '').toString().trim(); })
              .filter(function (s) { return s.length > 0; });
          }
          if (Array.isArray(data.instructions) && data.instructions.length > 0) {
            jsonld.recipeInstructions = data.instructions
              .map(function (s) { return (s || '').toString().trim(); })
              .filter(function (s) { return s.length > 0; })
              .map(function (s) { return { '@type': 'HowToStep', text: s }; });
          }
          if (data.category) jsonld.recipeCategory = data.category.toString();
          if (data.area) jsonld.recipeCuisine = data.area.toString();
          var script = el('script', { type: 'application/ld+json' });
          script.textContent = JSON.stringify(jsonld);
          head.appendChild(script);
          // Bot snapshot signal — keep this last so the prerender
          // doesn't capture a half-built head.
          head.appendChild(el('meta', { name: 'ssr-ready', content: '1' }));
        } catch (e) {
          // Never block the SPA on SEO injection failures.
          if (window.console) window.console.warn('setRecipeSeo failed:', e);
        }
      };
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
