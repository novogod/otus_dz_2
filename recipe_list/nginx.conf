server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Flutter web assets — long cache for hashed files.
    #
    # The named-capture `?<asset>` matches the basename of the
    # requested file (everything after the last `/`). Deep-link
    # URLs like `/en/recipes/52772` cause `fetch('sqlite3.wasm')`
    # and `<link rel=manifest>` icon URLs to be resolved against
    # the page path rather than `<base href="/">`, producing
    # requests like `/en/recipes/sqlite3.wasm` that don't exist
    # on disk. Without the fallback, those requests 404 and
    # sqflite_common_ffi_web's IndexedDB init throws, so Flutter
    # never finishes booting — the boot splash spins forever and
    # the recipe never renders. We `try_files` the literal URI
    # first (preserves long-cache for hashed assets), then the
    # basename at site root (recovers the wasm/png/etc that the
    # SPA actually needs), and only 404 if neither exists.
    location ~* ^/(?:.+/)?(?<asset>[^/]+\.(?:js|wasm|css|png|jpg|jpeg|gif|ico|svg|woff2?))$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri /$asset /icons/$asset =404;
    }

    # All routes fall back to index.html (Flutter client-side router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
